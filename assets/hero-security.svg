<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Installation de syst’┐Įme de s’┐Įcurit’┐Į moderne">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#152238"/>
      <stop offset="100%" style="stop-color:#1e3050"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0084d1"/>
      <stop offset="100%" style="stop-color:#006ba8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Mur / pi’┐Įce stylis’┐Įe -->
  <rect x="80" y="120" width="640" height="400" rx="8" fill="#0c1a2e" opacity="0.6"/>
  <!-- Cam’┐Įra de surveillance -->
  <g transform="translate(520, 160)">
    <rect x="0" y="20" width="120" height="70" rx="12" fill="#2a3f5f"/>
    <circle cx="60" cy="55" r="22" fill="#1a2d4a" stroke="#0084d1" stroke-width="3"/>
    <circle cx="60" cy="55" r="10" fill="#0084d1" filter="url(#glow)"/>
    <rect x="50" y="0" width="20" height="25" rx="4" fill="#3a5070"/>
  </g>
  <!-- D’┐Įtecteur de mouvement -->
  <g transform="translate(160, 180)">
    <rect x="0" y="0" width="80" height="100" rx="8" fill="#ffffff"/>
    <rect x="15" y="20" width="50" height="35" rx="4" fill="#e6f4fc"/>
    <circle cx="40" cy="75" r="8" fill="#10b981"/>
    <rect x="30" y="90" width="20" height="15" rx="2" fill="#94a3b8"/>
  </g>
  <!-- Centrale alarme -->
  <g transform="translate(300, 280)">
    <rect x="0" y="0" width="200" height="140" rx="12" fill="#ffffff"/>
    <rect x="20" y="20" width="160" height="60" rx="6" fill="#0c1a2e"/>
    <text x="100" y="58" text-anchor="middle" fill="#0084d1" font-family="system-ui,sans-serif" font-size="14" font-weight="700">S’┐ĮCURIS’┐Į</text>
    <circle cx="50" cy="105" r="12" fill="#10b981"/>
    <circle cx="100" cy="105" r="12" fill="#0084d1"/>
    <circle cx="150" cy="105" r="12" fill="#ff6b2c"/>
  </g>
  <!-- Smartphone -->
  <g transform="translate(580, 320)">
    <rect x="0" y="0" width="90" height="160" rx="12" fill="#ffffff"/>
    <rect x="8" y="25" width="74" height="110" rx="4" fill="#0c1a2e"/>
    <circle cx="45" cy="80" r="20" fill="none" stroke="#0084d1" stroke-width="2"/>
    <path d="M45 65 L45 80 L55 88" stroke="#0084d1" stroke-width="2" fill="none" stroke-linecap="round"/>
    <rect x="30" y="8" width="30" height="4" rx="2" fill="#e2e8f0"/>
  </g>
  <!-- Lignes de connexion -->
  <path d="M240 230 Q350 200 420 280" stroke="#0084d1" stroke-width="2" fill="none" opacity="0.4" stroke-dasharray="8 4"/>
  <path d="M500 350 Q550 300 580 350" stroke="#0084d1" stroke-width="2" fill="none" opacity="0.4" stroke-dasharray="8 4"/>
  <!-- Badge qualit’┐Į -->
  <g transform="translate(100, 420)">
    <rect x="0" y="0" width="180" height="50" rx="25" fill="url(#accent)"/>
    <text x="90" y="32" text-anchor="middle" fill="#ffffff" font-family="system-ui,sans-serif" font-size="13" font-weight="600">Ajax &amp; Daitem</text>
  </g>
</svg>
